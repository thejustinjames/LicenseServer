apiVersion: v1
kind: Secret
metadata:
  name: license-server-secrets
  labels:
    app: license-server
type: Opaque
stringData:
  # Database Connection
  DATABASE_URL: "postgresql://user:password@db-host:5432/license_server?schema=public"

  # JWT Secret (min 32 characters)
  JWT_SECRET: "your-super-secret-jwt-key-minimum-32-characters-long"

  # Admin Credentials (optional - for initial setup)
  ADMIN_EMAIL: "admin@your-domain.com"
  ADMIN_PASSWORD: "secure-admin-password"

  # Stripe API Keys
  STRIPE_SECRET_KEY: "sk_live_your_stripe_secret_key"
  STRIPE_WEBHOOK_SECRET: "whsec_your_webhook_secret"

  # AWS Credentials (optional - prefer IRSA for production)
  # AWS_ACCESS_KEY_ID: "AKIAXXXXXXXXXXXXXXXX"
  # AWS_SECRET_ACCESS_KEY: "your-secret-access-key"

  # MinIO Credentials (for local/dev S3-compatible storage)
  # When using MinIO, set these to match minio-secrets
  # AWS_ACCESS_KEY_ID: "minioadmin"
  # AWS_SECRET_ACCESS_KEY: "minioadmin123"

  # Cognito (if using Cognito auth)
  # COGNITO_USER_POOL_ID: "us-east-1_XXXXXXXXX"
  # COGNITO_CLIENT_ID: "xxxxxxxxxxxxxxxxxxxxxxxxxx"
---
