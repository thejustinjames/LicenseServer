apiVersion: v1
kind: ConfigMap
metadata:
  name: license-server-config
  labels:
    app: license-server
data:
  # Server Configuration
  PORT: "3000"
  NODE_ENV: "production"

  # Config Provider
  CONFIG_PROVIDER: "kubernetes"
  K8S_NAMESPACE: "default"

  # AWS Configuration
  AWS_REGION: "us-east-1"
  # AWS_SECRETS_PREFIX: "license-server/"
  # AWS_SECRETS_CACHE_TTL: "300"

  # Authentication Provider
  AUTH_PROVIDER: "jwt"
  # For Cognito:
  # AUTH_PROVIDER: "cognito"
  # COGNITO_REGION: "us-east-1"
  # COGNITO_USER_POOL_ID: "us-east-1_XXXXXXXXX"
  # COGNITO_CLIENT_ID: "xxxxxxxxxxxxxxxxxxxxxxxxxx"
  # COGNITO_ADMIN_GROUP: "Admins"

  # CORS Configuration
  CORS_ENABLED: "true"
  CORS_ORIGINS: "*"
  CORS_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
  CORS_ALLOWED_HEADERS: "Content-Type,Authorization,X-License-Key"
  CORS_CREDENTIALS: "true"
  CORS_MAX_AGE: "86400"

  # JWT Configuration
  JWT_EXPIRES_IN: "7d"

  # Stripe URLs (non-sensitive)
  STRIPE_SUCCESS_URL: "https://your-domain.com/success"
  STRIPE_CANCEL_URL: "https://your-domain.com/cancel"

  # S3 Configuration (for production, use AWS S3)
  # S3_BUCKET_NAME: "your-license-server-bucket"
  # S3_DOWNLOAD_EXPIRY_HOURS: "4"

  # MinIO Configuration (for local/dev, uncomment below and comment AWS S3 above)
  # S3_BUCKET_NAME: "license-server-downloads"
  # S3_ENDPOINT: "http://minio:9000"
  # S3_FORCE_PATH_STYLE: "true"
  # S3_DOWNLOAD_EXPIRY_HOURS: "4"

  # Logging
  LOG_LEVEL: "info"
