apiVersion: apps/v1
kind: Deployment
metadata:
  name: license-server
  labels:
    app: license-server
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: license-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: license-server
        version: v1
      annotations:
        # Force rolling update when configmap/secret changes
        checksum/config: "{{ .Values.configChecksum }}"
    spec:
      serviceAccountName: license-server
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: license-server
          image: license-server:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: license-server-config
            - secretRef:
                name: license-server-secrets
          env:
            # Override specific values if needed
            - name: NODE_ENV
              value: "production"
            - name: CONFIG_PROVIDER
              value: "kubernetes"
            - name: K8S_CONFIG_PATH
              value: "/etc/config"
            - name: K8S_SECRETS_PATH
              value: "/etc/secrets"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
            - name: secrets-volume
              mountPath: /etc/secrets
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config-volume
          configMap:
            name: license-server-config
        - name: secrets-volume
          secret:
            secretName: license-server-secrets
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - license-server
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: license-server
