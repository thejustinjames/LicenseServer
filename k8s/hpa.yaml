# Horizontal Pod Autoscaler
#
# Automatically scales the license-server deployment based on CPU/memory usage.
#
# Prerequisites:
# - Metrics server installed in the cluster
# - Resource requests defined in deployment

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: license-server
  labels:
    app: license-server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: license-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
---
# Optional: PodDisruptionBudget for high availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: license-server
  labels:
    app: license-server
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: license-server
