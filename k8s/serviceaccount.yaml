# Service Account for IAM Roles for Service Accounts (IRSA)
#
# This enables the license-server pods to assume an AWS IAM role
# without needing hardcoded credentials.
#
# Prerequisites:
# 1. EKS cluster with OIDC provider configured
# 2. IAM role with trust policy for the service account
# 3. IAM role with required permissions (S3, Secrets Manager, etc.)
#
# Create the IAM role with:
# eksctl create iamserviceaccount \
#   --name license-server \
#   --namespace default \
#   --cluster your-cluster-name \
#   --attach-policy-arn arn:aws:iam::ACCOUNT_ID:policy/LicenseServerPolicy \
#   --approve

apiVersion: v1
kind: ServiceAccount
metadata:
  name: license-server
  labels:
    app: license-server
  annotations:
    # Replace with your actual IAM role ARN
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/LicenseServerRole
    # Optional: STS regional endpoint for better latency
    eks.amazonaws.com/sts-regional-endpoints: "true"
---
# IAM Policy for the LicenseServerRole
# Apply this policy to the IAM role referenced above
#
# {
#   "Version": "2012-10-17",
#   "Statement": [
#     {
#       "Sid": "S3Access",
#       "Effect": "Allow",
#       "Action": [
#         "s3:GetObject",
#         "s3:PutObject",
#         "s3:DeleteObject",
#         "s3:ListBucket"
#       ],
#       "Resource": [
#         "arn:aws:s3:::your-license-server-bucket",
#         "arn:aws:s3:::your-license-server-bucket/*"
#       ]
#     },
#     {
#       "Sid": "SecretsManagerAccess",
#       "Effect": "Allow",
#       "Action": [
#         "secretsmanager:GetSecretValue",
#         "secretsmanager:DescribeSecret"
#       ],
#       "Resource": "arn:aws:secretsmanager:*:*:secret:license-server/*"
#     },
#     {
#       "Sid": "CognitoAccess",
#       "Effect": "Allow",
#       "Action": [
#         "cognito-idp:AdminGetUser",
#         "cognito-idp:AdminListGroupsForUser"
#       ],
#       "Resource": "arn:aws:cognito-idp:*:*:userpool/*"
#     }
#   ]
# }
#
# Trust Policy for the IAM role:
# {
#   "Version": "2012-10-17",
#   "Statement": [
#     {
#       "Effect": "Allow",
#       "Principal": {
#         "Federated": "arn:aws:iam::ACCOUNT_ID:oidc-provider/oidc.eks.REGION.amazonaws.com/id/OIDC_ID"
#       },
#       "Action": "sts:AssumeRoleWithWebIdentity",
#       "Condition": {
#         "StringEquals": {
#           "oidc.eks.REGION.amazonaws.com/id/OIDC_ID:sub": "system:serviceaccount:default:license-server",
#           "oidc.eks.REGION.amazonaws.com/id/OIDC_ID:aud": "sts.amazonaws.com"
#         }
#       }
#     }
#   ]
# }
