apiVersion: v1
kind: ConfigMap
metadata:
  name: license-server-config
  namespace: preprod
  labels:
    app: license-server
    component: licensing
    part-of: agencio
data:
  # Server Configuration
  NODE_ENV: "production"
  PORT: "3030"
  LOG_LEVEL: "info"

  # AWS Secrets Manager - Runtime secrets injection
  USE_AWS_SECRETS_MANAGER: "true"
  AWS_SECRET_NAME: "preprod/license-server"
  AWS_SECRET_REGION: "ap-southeast-1"
  CONFIG_PROVIDER: "secrets-manager"

  # AWS Region
  AWS_REGION: "ap-southeast-1"

  # S3 Storage Configuration (IRSA - no credentials needed)
  STORAGE_TYPE: "s3"
  STORAGE_PROVIDER: "s3"
  S3_BUCKET: "ag-license-server-assets"
  S3_BUCKET_NAME: "ag-license-server-assets"
  S3_REGION: "ap-southeast-1"
  S3_DOWNLOAD_EXPIRY_HOURS: "4"

  # Authentication - AWS Cognito
  AUTH_PROVIDER: "cognito"
  COGNITO_REGION: "ap-southeast-1"
  # COGNITO_USER_POOL_ID, COGNITO_CLIENT_ID and COGNITO_ADMIN_CLIENT_ID
  # loaded from Secrets Manager.
  # License Server admins live in the staff pool, in this group, and must
  # complete MFA (TOTP) in the token (amr=mfa) for admin endpoints.
  COGNITO_ADMIN_GROUP: "license-admins"
  ADMIN_GROUP_NAME: "license-admins"
  ADMIN_REQUIRE_MFA: "true"
  # Customer (external) Cognito pool — separate from staff pool above.
  # CUSTOMER_AUTH_ENABLED, CUSTOMER_COGNITO_USER_POOL_ID,
  # CUSTOMER_COGNITO_CLIENT_ID, CUSTOMER_COGNITO_SERVER_CLIENT_ID and
  # CUSTOMER_COGNITO_SERVER_CLIENT_SECRET are loaded from Secrets Manager.
  CUSTOMER_COGNITO_REGION: "ap-southeast-1"

  # Database - RDS PostgreSQL (connection string from Secrets Manager)
  # DATABASE_URL loaded from Secrets Manager

  # Redis - ElastiCache Serverless
  REDIS_TLS: "true"
  REDIS_DB: "0"
  REDIS_RETRY_DELAY: "100"
  REDIS_MAX_RETRIES: "3"
  REDIS_CONNECT_TIMEOUT: "10000"
  REDIS_COMMAND_TIMEOUT: "5000"
  # REDIS_HOST loaded from Secrets Manager

  # CORS - Internal services + frontend
  CORS_ORIGINS: "https://licensing.agencio.cloud,https://app.agencio.cloud"

  # License Configuration
  OFFLINE_GRACE_DAYS: "7"
  CHECK_IN_INTERVAL_DAYS: "7"

  # Stripe Configuration (keys from Secrets Manager)
  STRIPE_SUCCESS_URL: "https://licensing.agencio.cloud/success"
  STRIPE_CANCEL_URL: "https://licensing.agencio.cloud/cancel"
  STRIPE_TAX_ENABLED: "true"

  # Account Security
  ACCOUNT_LOCKOUT_ATTEMPTS: "5"
  ACCOUNT_LOCKOUT_DURATION_MINUTES: "15"

  # CAPTCHA (keys from Secrets Manager)
  CAPTCHA_FAIL_OPEN: "false"

  # Service Discovery (internal FQDN)
  LICENSE_SERVER_URL: "http://license-server.preprod.svc.cluster.local:3030"

  # Metrics
  METRICS_ENABLED: "true"
  METRICS_PORT: "3030"
  METRICS_PATH: "/metrics"
