apiVersion: v1
kind: ServiceAccount
metadata:
  name: license-server-sa
  namespace: preprod
  labels:
    app: license-server
    component: licensing
    part-of: agencio
  annotations:
    # IRSA - IAM Role for Service Account
    # This role must have permissions for:
    # - Secrets Manager: GetSecretValue for preprod/license-server
    # - S3: Read/Write to ag-license-server-assets bucket
    # - Cognito: User pool operations (if using Cognito auth)
    eks.amazonaws.com/role-arn: "arn:aws:iam::772693061584:role/Preprod-LicenseServerService-Role"
