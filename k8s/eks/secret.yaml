apiVersion: v1
kind: Secret
metadata:
  name: license-server-secret
  namespace: preprod
  labels:
    app: license-server
    component: licensing
    part-of: agencio
type: Opaque
stringData:
  # All secrets managed by AWS Secrets Manager
  # Secrets are loaded at runtime via bootstrap.mjs from AWS Secrets Manager
  #
  # Required secrets in AWS Secrets Manager (preprod/license-server):
  # - DATABASE_URL: PostgreSQL connection string
  # - JWT_SECRET: JWT signing secret
  # - STRIPE_SECRET_KEY: Stripe API secret key
  # - STRIPE_WEBHOOK_SECRET: Stripe webhook signing secret
  # - COGNITO_USER_POOL_ID: AWS Cognito User Pool ID
  # - COGNITO_CLIENT_ID: AWS Cognito App Client ID
  # - COGNITO_CLIENT_SECRET: AWS Cognito App Client Secret
  # - REDIS_HOST: ElastiCache endpoint
  # - HCAPTCHA_SITE_KEY: hCaptcha site key
  # - HCAPTCHA_SECRET_KEY: hCaptcha secret key
  # - RSA_PRIVATE_KEY: Offline license signing key
  # - RSA_PUBLIC_KEY: Offline license verification key
  #
  MANAGED_BY: "aws-secrets-manager"
