# Development Secrets - Use for local testing only
# DO NOT use these values in production!
apiVersion: v1
kind: Secret
metadata:
  name: license-server-secrets
  labels:
    app: license-server
    environment: development
type: Opaque
stringData:
  # Database Connection (assuming PostgreSQL running in cluster)
  DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/license_server?schema=public"

  # JWT Secret (for development only)
  JWT_SECRET: "dev-jwt-secret-minimum-32-characters-long-for-testing"

  # Admin Credentials
  ADMIN_EMAIL: "admin@localhost"
  ADMIN_PASSWORD: "admin123456"

  # Stripe Test Keys (use your own test keys)
  STRIPE_SECRET_KEY: "sk_test_your_test_key_here"
  STRIPE_WEBHOOK_SECRET: "whsec_your_test_webhook_secret"

  # MinIO Credentials (matches minio-secrets)
  AWS_ACCESS_KEY_ID: "minioadmin"
  AWS_SECRET_ACCESS_KEY: "minioadmin123"
